<style>
button {
    font: inherit;
    padding: 6px 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #f5f5f5;
    cursor: pointer;
}
button:hover { background: #ebebeb; }
button:active { background: #e0e0e0; }
.btn-primary {
    background: #0071e3;
    border-color: #0071e3;
    color: white;
}
.btn-primary:hover { background: #0064c9; }

select {
    font: inherit;
    -webkit-appearance: none;
    appearance: none;
    padding: 5px 26px 5px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23666'/></svg>") no-repeat right 9px center;
    cursor: pointer;
}
select:hover { border-color: #aaa; }

/* Visually hidden but available to screen readers - used for the timeline's
   text equivalent and the live filter-status announcement. */
.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

#entity-table,
#entity-table thead,
#entity-table tbody {
    display: block;
}
#entity-table {
    margin-top: 20px;
}
#entity-table thead {
    position: sticky;
    top: 0;
    z-index: 20;
}
/* Neutralize UA cell styling; the .entity-* classes do the real styling. */
th, td {
    display: block;
    padding: 0;
    font-weight: inherit;
    text-align: inherit;
}
.entity-controls {
    display: flex;
    align-items: center;
    gap: 16px;
}
#export-btn {
    margin-left: auto;
}
#export-panel {
    display: none;
    margin-top: 10px;
    padding: 10px 14px;
    gap: 16px;
    align-items: center;
    width: fit-content;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fafafa;
}
#export-panel.visible {
    display: flex;
}
#entity-table tr {
    display: flex;
    align-items: stretch;
    gap: 8px;
    box-shadow: inset 0 -1px rgba(0, 0, 0, 0.08);
    min-height: 1rem;
}
#entity-table tbody tr:hover { background-color: rgba(255, 230, 0, 0.25); }
#entity-table thead tr {
    background: #f2f2f3;
    font-size: 0.8em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #666;
    box-shadow: inset 0 -2px rgba(0, 0, 0, 0.25);
}
#entity-description-text {
    margin: 12px 0 0;
    min-height: 1.2em; /* keeps the layout steady when a type has no description */
    color: #555;
}
.entity-name {
    width: 180px;
    flex-shrink: 0;
    padding: 3px;
}
.entity-pages {
    width: 60px;
    text-align: right;
    flex-shrink: 0;
    padding: 3px;
}
.entity-timeline {
    display: flex;
    flex: 1;
}
.scene-cell {
    position: relative;
}
.scene-cell:hover {
    box-shadow:
        inset 0 0 0 2px white,
        0 0 6px rgba(0, 0, 0, 0.5);
    z-index: 10;
}
.scene-divider { border-left: 1px solid #aaa; }
#scene-tooltip {
    position: fixed;
    display: none;
    background: rgba(30, 30, 30, 0.95);
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.85em;
    line-height: 1.5;
    pointer-events: none;
    z-index: 100;
    max-width: 280px;
}
#scene-tooltip .tooltip-title {
    font-weight: 600;
}
#scene-tooltip .tooltip-heading {
    color: #ccc;
    margin-bottom: 2px;
}
#scene-tooltip .tooltip-swatch {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    margin-right: 6px;
}
#entity-table thead .entity-timeline > .scene-divider::before {
    content: attr(data-scene-id);
    position: absolute;
    top: 0px;
    left: 2px;
    white-space: nowrap;
    color: darkgrey;
}
</style>
<div class="entity-controls">
    <label>
        Entity Type:
        <select id="entity-type-filter">
        </select>
    </label>
<label>
    Sort By:
    <select id="entity-sort">
        <option value="pages">Page Length</option>
        <option value="alphabetical">Alphabetical</option>
        <option value="firstAppearance">First Appearance</option>
    </select>
</label>
<button id="export-btn" aria-expanded="false" aria-controls="export-panel">Export</button>
<button id="manage-entity-types-btn">Manage Custom Entity Types</button>
</div>
<div id="export-panel">
    <label>
        Format:
        <select id="export-format">
            <option value="csv">CSV</option>
            <option value="json">JSON</option>
        </select>
    </label>
    <label>
        Entities:
        <select id="export-scope">
            <option value="visible">Currently visible</option>
            <option value="all">All entities</option>
        </select>
    </label>
    <button id="export-confirm" class="btn-primary">Export…</button>
</div>
<p id="entity-description-text"></p>
<!-- The `display` overrides above strip the implicit table semantics, so the
     ARIA roles here (and in createTimelineRow) put them back for screen readers.-->
<table id="entity-table" role="table" aria-label="Entity appearances by scene">
    <thead role="rowgroup"></thead>
    <tbody role="rowgroup"></tbody>
</table>
<!-- Announces the active entity type and match count when the filter changes. -->
<p id="filter-status" class="sr-only" role="status"></p>
<!-- shared_helpers.js, inlined by renderTemplate in plugin.js. -->
<script>{{SHARED_HELPERS}}</script>
<script>
const entities = {{ENTITIES}};
const sceneData = {{SCENES}};
const descriptions = {{DESCRIPTIONS}};
const entityTypeGroups = {{ENTITY_TYPE_GROUPS}};

// sceneData is keyed by scene number; `index` carries the script order.
const orderedScenes = Object.values(sceneData).sort((a, b) => a.index - b.index);

function renderEntityTypeFilter(entityTypeGroups, entities) {
    const select = document.getElementById("entity-type-filter");

    const counts = {};
    for (const entity of Object.values(entities)) {
        counts[entity.entityType] = (counts[entity.entityType] || 0) + 1;
    }

    for (const [groupLabel, types] of Object.entries(entityTypeGroups)) {
        if (types.length === 0) continue;
        const group = document.createElement("optgroup");
        group.label = groupLabel;

        for (const type of types) {
            const count = counts[type] || 0;
            const option = document.createElement("option");
            option.value = type;
            option.textContent = `${type} (${count})`;
            option.disabled = count === 0;
            group.appendChild(option);
        }
        select.appendChild(group);
    }

    // Default to the first type that actually has results.
    const firstEnabled = select.querySelector("option:not(:disabled)");
    if (firstEnabled) select.value = firstEnabled.value;

    return select;
}

function renderEntityTable(entities, orderedScenes) {
    tableHead.replaceChildren();
    tableBody.replaceChildren();

    const dividerFrequency = Math.floor(orderedScenes.length / 10) || 1;
    const rows = [];

    const headerRow = createTimelineRow({
            name: "Entities",
            pages: "Pages",
            orderedScenes,
            dividerFrequency,
            isHeader: true
    });
    tableHead.appendChild(headerRow);
    for (const entity of Object.values(entities)) {
        const row = createTimelineRow({
            name: entity.entityName,
            pages: formatPageLength(entity.eights),
            color: entity.entityColor,
            scenes: entity.scenes,
            orderedScenes,
            dividerFrequency
        });
        // Metadata for sorting and filtering. Dataset values are always
        // strings, so the numeric ones are Number()ed where compared.
        row.dataset.name = entity.entityName;
        row.dataset.type = entity.entityType;
        row.dataset.eights = entity.eights;
        row.dataset.firstAppearance = entity.firstAppearance;
        tableBody.appendChild(row);
        rows.push(row);
    }
    return rows;
}

function createTimelineRow({
    name,
    pages,
    color = null,
    scenes = [],
    orderedScenes,
    dividerFrequency,
    isHeader = false
}) {
    const row = document.createElement("tr");
    row.setAttribute("role", "row");
    const cellTag = isHeader ? "th" : "td";
    const dataRole = isHeader ? "columnheader" : "cell";

    // The entity name heads its row, so it is a th in every row; the explicit
    // role restores what the display overrides strip.
    const nameCell = document.createElement("th");
    nameCell.className = "entity-name";
    nameCell.textContent = name;
    nameCell.scope = isHeader ? "col" : "row";
    nameCell.setAttribute("role", isHeader ? "columnheader" : "rowheader");
    row.appendChild(nameCell);

    // The timeline is one table cell; the scene divs inside it are paint,
    // not data cells, so they are hidden from the accessibility tree and the
    // cell carries an sr-only text list of appearances instead (set below).
    const timeline = document.createElement(cellTag);
    timeline.className = "entity-timeline";
    timeline.setAttribute("role", dataRole);
    if (isHeader) timeline.scope = "col";

    if (color) {
        timeline.style.background = color + "0D";
    }

    const sceneSet = new Set(scenes);
    const appearsIn = [];

    orderedScenes.forEach((scene, index) => {
        const cell = document.createElement("div");
        cell.className = "scene-cell";
        cell.setAttribute("aria-hidden", "true");

        cell.style.flexGrow = scene.eights;
        cell.style.flexBasis = "0";
        cell.dataset.sceneId = scene.id;

        if (sceneSet.has(scene.id)) {
            appearsIn.push(scene.id);
            if (color) cell.style.background = color;
        }
        if (index % dividerFrequency === 0) {
            cell.classList.add("scene-divider");
        }
        timeline.appendChild(cell);
    });
    // Real (visually hidden) text rather than aria-label: screen readers
    // reliably read cell content, but aria-label on plain cells is spotty.
    const textEquivalent = document.createElement("span");
    textEquivalent.className = "sr-only";
    textEquivalent.textContent = isHeader
        ? "Scenes"
        : appearsIn.length
            ? `Appears in scenes ${appearsIn.join(", ")}`
            : "No scene appearances";
    timeline.prepend(textEquivalent);
    row.appendChild(timeline);

    const pagesCell = document.createElement(cellTag);
    pagesCell.className = "entity-pages";
    pagesCell.textContent = pages;
    pagesCell.setAttribute("role", dataRole);
    if (isHeader) pagesCell.scope = "col";
    row.appendChild(pagesCell);

    return row;
}

const table = document.getElementById("entity-table");
const tableHead = table.querySelector("thead");
const tableBody = table.querySelector("tbody");
const filterStatus = document.getElementById("filter-status");
const rows = renderEntityTable(entities, orderedScenes);
const typeFilter = renderEntityTypeFilter(entityTypeGroups, entities);

function filterRows(rows, selectedType) {
    let count = 0;
    for (const row of rows) {
        const visible = row.dataset.type === selectedType;
        row.style.display = visible ? "" : "none";
        if (visible) count++;
    }
    filterStatus.textContent =
        `${count} ${count === 1 ? "entity" : "entities"} shown for ${selectedType}`;
}
function sortRows(rows, sortBy) {
    switch (sortBy) {
        case "alphabetical":
            rows.sort((a, b) =>
                a.dataset.name.localeCompare(b.dataset.name)
            );
            break;

        case "pages":
            rows.sort((a, b) =>
                Number(b.dataset.eights) - Number(a.dataset.eights)
            );
            break;

        case "firstAppearance":
            rows.sort((a, b) =>
                Number(a.dataset.firstAppearance) - Number(b.dataset.firstAppearance)
            );
            break;
    }

    for (const row of rows) {
        tableBody.appendChild(row);
    }
}

const descriptionText = document.getElementById("entity-description-text");
function showDescriptionFor(entityType) {
    descriptionText.textContent = descriptions[entityType] || "";
}

typeFilter.addEventListener("change", () => {
    filterRows(rows, typeFilter.value);
    showDescriptionFor(typeFilter.value);
});

const sortSelect = document.getElementById("entity-sort");
sortSelect.addEventListener("change", () => {
    sortRows(rows, sortSelect.value);
});

filterRows(rows, typeFilter.value);
sortRows(rows, sortSelect.value);
showDescriptionFor(typeFilter.value);

// Custom tooltip - Shows the scene number plus every currently visible entity in that scene.
const tooltip = document.createElement("div");
tooltip.id = "scene-tooltip";
tooltip.setAttribute("aria-hidden", "true");
document.body.appendChild(tooltip);

function entitiesInScene(sceneId) {
    return Object.values(entities).filter(entity =>
        entity.entityType === typeFilter.value &&
        entity.scenes.some(id => String(id) === sceneId)
    );
}

let tooltipCell = null;

function fillTooltip(sceneId) {
    tooltip.replaceChildren();

    const title = document.createElement("div");
    title.className = "tooltip-title";
    title.textContent = `Scene ${sceneId}`;
    tooltip.appendChild(title);

    const heading = document.createElement("div");
    heading.className = "tooltip-heading";
    heading.textContent = sceneData[sceneId]?.heading || "";
    tooltip.appendChild(heading);

    for (const entity of entitiesInScene(sceneId)) {
        const line = document.createElement("div");
        const swatch = document.createElement("span");
        swatch.className = "tooltip-swatch";
        swatch.style.background = entity.entityColor;
        line.appendChild(swatch);
        line.appendChild(document.createTextNode(entity.entityName));
        tooltip.appendChild(line);
    }
}

table.addEventListener("mousemove", (event) => {
    const cell = event.target.closest(".scene-cell");
    if (!cell) {
        tooltipCell = null;
        tooltip.style.display = "none";
        return;
    }

    if (cell !== tooltipCell) {
        tooltipCell = cell;
        fillTooltip(cell.dataset.sceneId);
        tooltip.style.display = "block";
    }

    // Follow the cursor, but keep the tooltip inside the window.
    const x = Math.min(event.clientX + 12, window.innerWidth - tooltip.offsetWidth - 8);
    const y = Math.min(event.clientY + 14, window.innerHeight - tooltip.offsetHeight - 8);
    tooltip.style.left = `${Math.max(x, 0)}px`;
    tooltip.style.top = `${Math.max(y, 0)}px`;
});

table.addEventListener("mouseleave", () => {
    tooltipCell = null;
    tooltip.style.display = "none";
});

document.getElementById("manage-entity-types-btn").addEventListener("click", () => {
    Beat.call(() => {
        Beat.custom.manageCustomEntityTypes();
    });
});

// Export: content is built here; plugin.js only opens the save dialog and
// writes the file.
const exportPanel = document.getElementById("export-panel");
const exportBtn = document.getElementById("export-btn");

function setExportPanelOpen(open) {
    exportPanel.classList.toggle("visible", open);
    exportBtn.setAttribute("aria-expanded", String(open));
}

exportBtn.addEventListener("click", () => {
    setExportPanelOpen(!exportPanel.classList.contains("visible"));
});

function exportRows(scope) {
    let list = Object.values(entities);
    if (scope === "visible") {
        list = list.filter(entity => entity.entityType === typeFilter.value);
    }
    return list.map(entity => ({
        type: entity.entityType,
        name: entity.entityName,
        pageLength: formatPageLength(entity.eights),
        eights: entity.eights,
        firstAppearance: orderedScenes[entity.firstAppearance]?.id ?? "",
        scenes: entity.scenes
    }));
}

document.getElementById("export-confirm").addEventListener("click", () => {
    const format = document.getElementById("export-format").value;
    const rows = exportRows(document.getElementById("export-scope").value);
    const content = format === "json" ? JSON.stringify(rows, null, 2) : toCSV(rows);

    Beat.call((payloadJSON) => {
        Beat.custom.exportEntities(payloadJSON);
    }, JSON.stringify({ format, content }));

    setExportPanelOpen(false);
});
</script>
